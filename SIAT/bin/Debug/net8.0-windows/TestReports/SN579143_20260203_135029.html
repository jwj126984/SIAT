<html lang="zh-CN">
<head>

        .summary { background: #e8f4f8; padding: 15px; border-radius: 5px; margin-bottom: 20px; }
        .step-result { margin: 10px 0; padding: 10px; border-left: 4px solid #4CAF50; background: #f9f9f9; }
        .step-failed { border-left-color: #f44336; background: #ffeaea; }
        .conclusion { padding: 15px; border-radius: 5px; margin-top: 20px; }
        .passed { background: #e8f5e8; border: 1px solid #4CAF50; }
        .failed { background: #ffeaea; border: 1px solid #f44336; }
    </style>
</head>

        <p><strong>测试结果:</strong> <span style="color: #4CAF50">通过</span></p>
    </div>
    <div class="summary">
        <h2>测试统计</h2>
        <p><strong>总步骤数:</strong> 1</p>
        <p><strong>通过步骤:</strong> <span style="color: #4CAF50">1</span></p>

        <p><strong>通过率:</strong> 100.00%</p>

    <h2>详细步骤执行结果</h2>
    <div class="step-result">
        <h3>步骤 1: 示例步骤1</h3>
        <p><strong>状态:</strong> <span style="color: #4CAF50">✓ 通过</span></p>
        <p><strong>耗时:</strong> 8.877 秒</p>
        <p><strong>实际值:</strong> 示例步骤1执行成功</p>
    </div>
    <div class="conclusion passed">
        <h2>测试结论</h2>
        <p>✓ 测试通过 - 所有测试步骤均执行成功</p>
    </div>
    <p style="text-align: center; margin-top: 30px; color: #666;">报告生成时间: 2026-02-03 13:50:29</p>
</body>
</html>
